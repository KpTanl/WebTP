<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tous les utilisateurs</title>
</head>
<body>
    <h1>Tous les utilisateurs</h1>
    <p th:text="${message}"></p>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Statut</th>
                <th>Conferences organisees</th>
                <th>Conferences participees</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.status != null ? user.status.nomStatut : 'Aucun'}"></td>
                <td>
                    <span th:if="${#lists.isEmpty(user.conferencesOrganized)}">Aucune</span>
                    <ul th:if="${!#lists.isEmpty(user.conferencesOrganized)}">
                        <li th:each="conference : ${user.conferencesOrganized}"
                            th:text="${conference.titleconf + ' (' + conference.dtstartconf + ' - ' + conference.dtendconf + ')'}"></li>
                    </ul>
                </td>
                <td>
                    <span th:if="${#sets.isEmpty(user.conferencesParticipated)}">Aucune</span>
                    <ul th:if="${!#sets.isEmpty(user.conferencesParticipated)}">
                        <li th:each="conference : ${user.conferencesParticipated}"
                            th:text="${conference.titleconf + ' (' + conference.dtstartconf + ' - ' + conference.dtendconf + ')'}"></li>
                    </ul>
                </td>
            </tr>
        </tbody>
    </table>
    <br>
    <a href="/menu">Retour au menu</a>
</body>
</html>
