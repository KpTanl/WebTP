<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tous les statuts</title>
</head>
<body>
    <h1>Tous les statuts</h1>
    <p th:text="${message}"></p>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nom</th>
        </tr>
        <tr th:each="status : ${statuses}">
            <td th:text="${status.codeStatut}"></td>
            <td th:text="${status.nomStatut}"></td>
        </tr>
    </table>
    <br>
    <a href="/menu">Retour au menu</a>
</body>
</html>
