<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Résultat</title>
</head>
<body>
    <h1>Résultat</h1>

    <p th:text="${message}"></p>

    <p>Toutes les conférences ci-dessous:</p>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Edition</th>
            <th>Date début</th>
            <th>Date fin</th>
            <th>URL</th>
        </tr>
        <tr th:each="c : ${conferences}">
            <td th:text="${c.idconf}"></td>
            <td th:text="${c.titleconf}"></td>
            <td th:text="${c.nbeditionconf}"></td>
            <td th:text="${c.dtstartconf}"></td>
            <td th:text="${c.dtendconf}"></td>
            <td th:text="${c.urlwebsiteconf}"></td>
        </tr>
    </table>


    <br>
    <a href="/menu.html">Retour au menu</a>
</body>
</html>
