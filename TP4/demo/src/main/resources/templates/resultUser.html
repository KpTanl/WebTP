<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultat utilisateur</title>
</head>
<body>
    <h1>Resultat utilisateur</h1>
    <p th:text="${message}"></p>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Email</th>
            <th>Statut</th>
            <th>Conferences organisees</th>
            <th>Conferences participees</th>
        </tr>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.status != null ? u.status.nomStatut : 'Aucun'}"></td>
            <td>
                <span th:if="${#lists.isEmpty(u.conferencesOrganized)}">Aucune</span>
                <ul th:if="${!#lists.isEmpty(u.conferencesOrganized)}">
                    <li th:each="conference : ${u.conferencesOrganized}"
                        th:text="${conference.titleconf + ' (' + conference.dtstartconf + ' - ' + conference.dtendconf + ')'}"></li>
                </ul>
            </td>
            <td>
                <span th:if="${#sets.isEmpty(u.conferencesParticipated)}">Aucune</span>
                <ul th:if="${!#sets.isEmpty(u.conferencesParticipated)}">
                    <li th:each="conference : ${u.conferencesParticipated}"
                        th:text="${conference.titleconf + ' (' + conference.dtstartconf + ' - ' + conference.dtendconf + ')'}"></li>
                </ul>
            </td>
        </tr>
    </table>
    <br>
    <a href="/menu">Retour au menu</a>
</body>
</html>
