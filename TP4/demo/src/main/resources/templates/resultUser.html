<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Résultat</title>
</head>
<body>
    <h1>Résultat</h1>

    <p th:text="${message}"></p>

    <p>Toutes les Users ci-dessous:</p>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Email</th>
            <th>Conférences organisées</th>
            <th>Conférences participées</th>
        </tr>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.username}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.conferencesOrganized}"></td>
            <td th:text="${u.conferencesParticipated}"></td>
        </tr>
    </table>

    <br>
    <a href="/menu.html">Retour au menu</a>
</body>
</html>
