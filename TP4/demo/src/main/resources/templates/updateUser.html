<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un utilisateur</title>
</head>
<body>
    <h1>Modifier un utilisateur</h1>
    <p>Laissez le mot de passe vide si vous ne voulez pas le changer.</p>
    <form action="/users/update" method="post">
        <label for="id">ID :</label>
        <input type="number" id="id" name="id" min="1" required>
        <br>
        <label for="username">Nom :</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="password">Nouveau mot de passe :</label>
        <input type="password" id="password" name="password">
        <br>
        <label for="statusId">Statut :</label>
        <select id="statusId" name="statusId" required>
            <option value="">Choisissez un statut</option>
            <option th:each="status : ${statuses}"
                    th:value="${status.codeStatut}"
                    th:text="${status.nomStatut}"></option>
        </select>
        <br>
        <button type="submit">Modifier</button>
    </form>
    <p><a href="/statuses/all">Voir les statuts existants</a></p>
    <p><a href="/menu">Retour au menu</a></p>
</body>
</html>
