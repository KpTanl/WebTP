<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rechercher les conférences d'un utilisateur</title>
</head>
<body>
    <h1>Rechercher les conférences d'un utilisateur</h1>
    <form action="/users/conferences" method="post">
        <label for="id">ID de l'utilisateur:</label>
        <input type="number" id="id" name="id" required>
        <button type="submit">Rechercher</button>
    </form>
    <a href="/">Retour au menu</a>
</body>
</html>
