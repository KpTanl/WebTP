<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rechercher les conferences d'un utilisateur</title>
</head>
<body>
    <h1>Rechercher les conferences d'un utilisateur</h1>
    <p>Pour votre propre compte connecte, utilisez aussi <a href="/users/me/conferences">l'espace utilisateur</a>.</p>

</body>
