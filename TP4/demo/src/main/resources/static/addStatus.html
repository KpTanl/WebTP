<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un statut</title>
</head>
<body>
    <h1>Ajouter un statut</h1>
    <form action="/statuses/add" method="post">
        <label for="nomStatut">Nom du statut :</label>
        <input type="text" id="nomStatut" name="nomStatut" required>
        <br>
        <button type="submit">Ajouter</button>
    </form>
</body>
</html>
