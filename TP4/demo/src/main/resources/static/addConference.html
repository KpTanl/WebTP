<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une conference</title>
</head>
<body>
    <h1>Ajouter une conference</h1>
    <form action="/conferences/add" method="post">
        <label for="nom">Nom :</label>
        <input type="text" id="nom" name="nom" required>
        <br>
        <label for="titleconf">Titre :</label>
        <input type="text" id="titleconf" name="titleconf" required>
        <br>
        <label for="nbeditionconf">Numero d'edition :</label>
        <input type="number" id="nbeditionconf" name="nbeditionconf" required>
        <br>
        <label for="dtstartconf">Date de debut :</label>
        <input type="date" id="dtstartconf" name="dtstartconf" required>
        <br>
        <label for="dtendconf">Date de fin :</label>
        <input type="date" id="dtendconf" name="dtendconf" required>
        <br>
        <label for="urlwebsiteconf">URL du site web :</label>
        <input type="text" id="urlwebsiteconf" name="urlwebsiteconf" required>
        <br>
        <label for="organizerId">ID de l'organisateur :</label>
        <input type="number" id="organizerId" name="organizerId" required>
        <br>
        <button type="submit">Ajouter</button>
    </form>
</body>
</html>
