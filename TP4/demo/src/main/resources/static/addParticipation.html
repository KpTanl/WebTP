<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscrire un utilisateur à une conférence</title>
</head>
<body>
    <h1>Inscrire un utilisateur à une conférence</h1>
    <form action="/users/participate" method="post">
        <label for="userId">ID de l'utilisateur:</label>
        <input type="number" id="userId" name="userId" required><br><br>
        
        <label for="conferenceId">ID de la conférence:</label>
        <input type="number" id="conferenceId" name="conferenceId" required><br><br>
        
        <button type="submit">Inscrire (Ajouter)</button>
    </form>
    <br>
    <a href="/menu">Retour au menu</a>
</body>
</html>
