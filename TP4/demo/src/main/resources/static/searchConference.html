<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rechercher une conference</title>
</head>
<body>
    <h1>Rechercher une conference</h1>
    <form action="/conferences/search" method="post">
        <label for="titleconf">Titre de la conference :</label>
        <input type="text" id="titleconf" name="titleconf" required>
        <br>
        <button type="submit">Rechercher</button>
    </form>
</body>
</html>
