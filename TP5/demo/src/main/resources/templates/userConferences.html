<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Conférences de l'utilisateur</title>
</head>
<body>
    <h1 th:text="'Conférences de ' + ${user.username}">Conférences</h1>
    <p th:text="'Email: ' + ${user.email}"></p>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Titre de la conférence</th>
                <th>Date de début</th>
                <th>Date de fin</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="conf : ${conferences}">
                <td th:text="${conf.idconf}"></td>
                <td th:text="${conf.titleconf}"></td>
                <td th:text="${conf.dtstartconf}"></td>
                <td th:text="${conf.dtendconf}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(conferences)}">
                <td colspan="4">Aucune conférence trouvée pour cet utilisateur.</td>
            </tr>
        </tbody>
    </table>
    <a href="/">Retour au menu</a>
</body>
</html>
