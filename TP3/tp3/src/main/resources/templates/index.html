<!DOCTYPE html>
    <html>
    <head>
        <title>Number</title>
        <title lang="fr">Nombre</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

    </head>
    <body>
        <h1>Number</h1>
        <form action="calculate" method="post">
            <label for="numbre_low">Number low:</label>
            <input type="number" id="numbre_low" name="numbre_low" required>
            <br>
            <label for="numbre_high">Number high:</label>
            <input type="number" id="numbre_high" name="numbre_high" required>
            <br>
            <button type="submit">Calculate</button>
        </form>
    </body>
    </html>
