<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Detail du film</title>
</head>

<body>
    <h1 th:text="${film.title}"></h1>

    <p th:if="${message}" th:text="${message}" style="color: green;"></p>

    <p>
        <a th:href="@{/favorites}">Mes favoris</a>&nbsp;&nbsp;
        <a th:href="@{/watchlist}">Ma liste a voir</a>
    </p>

    <div th:if="${film.posterPath != null}" style="margin-bottom: 1rem;">
        <img th:src="@{|https://image.tmdb.org/t/p/w500${film.posterPath}|}" th:alt="${film.title}"
            style="max-width: 320px; height: auto; border-radius: 8px;">
    </div>

    <p>
        <strong>Date de sortie :</strong>
        <span th:text="${film.releaseDate}"></span>
    </p>

    <p>
        <strong>Note :</strong>
        <span th:text="${#numbers.formatDecimal(film.voteAverage, 1, 2)}"></span>
    </p>

    <p>
        <strong>Resume :</strong>
        <span th:text="${film.overview}"></span>
    </p>

    <div th:if="${!isFavorite}">
        <form th:action="@{/films/{id}/favorite/add(id=${film.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Ajouter aux favoris</button>
        </form>
    </div>

    <div th:if=${isFavorite}>
        <form th:action="@{/films/{id}/favorite/remove(id=${film.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Supprimer des favoris</button>
        </form>
    </div>

    <div th:if="${!isInWatchlist}">
        <form th:action="@{/films/{id}/watchlist/add(id=${film.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Ajouter a la liste a voir</button>
        </form>
    </div>

    <div th:if=${isInWatchlist}>
        <form th:action="@{/films/{id}/watchlist/remove(id=${film.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Supprimer de la liste a voir</button>
        </form>
    </div>

    <br>
    <a th:href="@{/films}">Retour a la liste</a>
</body>

</html>
